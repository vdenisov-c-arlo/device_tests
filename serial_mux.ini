# serial_mux.ini — Shared configuration for serial_mux, serial_mux_client,
# serial_terminals.sh, flash_lory.py, and voodoo_do_pulse.py
#
# All tools read this file from the same directory as themselves (utils/).

[isp]
serial_port = /dev/ttyUSB1
baud = 115200
tcp_host = 10.9.8.8
tcp_port = 9001

[mcu]
serial_port = /dev/ttyACM1
baud = 115200
tcp_host = 10.9.8.8
tcp_port = 9002

[server]
# Host IP where firmware images are served from (tun0 interface for remote access)
host_ip = 10.9.8.7
http_port = 8080
images_base = /var/www

[voodoo]
host = 10.9.8.8
modbus_port = 502
